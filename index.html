<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDP Digital — Proyectos y Estado</title>
<style>
  :root{
    --bg-1:#0d0221;
    --bg-2:#26065f;
    --bg-3:#3c0d99;
    --magenta:#ff2e88;
    --cyan:#00e5ff;
    --purple:#8b5cf6;
    --amber:#ffb020;
    --teal:#1de9b6;
    --card-bg:rgba(255,255,255,0.06);
    --card-border:rgba(255,255,255,0.14);
    --text-1:#f7f6ff;
    --text-2:#c3bce3;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(255,46,136,0.25), transparent 45%),
      radial-gradient(circle at 90% 15%, rgba(0,229,255,0.2), transparent 40%),
      linear-gradient(160deg,var(--bg-1),var(--bg-2) 55%,var(--bg-3));
    color:var(--text-1);
    min-height:100vh;
    padding:48px 24px 80px;
  }
  .wrap{max-width:960px; margin:0 auto;}
  header{margin-bottom:40px; display:flex; flex-direction:column; gap:20px;}
  .brand-row{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;}
  .logo-chip{
    display:inline-flex;
    align-items:center;
    background:#ffffff;
    border-radius:14px;
    padding:10px 18px;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
  }
  .logo-chip svg{display:block; height:44px; width:auto;}
  .byline{text-align:right; font-size:13px; color:var(--text-2); line-height:1.5;}
  .byline strong{color:var(--text-1); font-weight:600;}
  .eyebrow{
    display:inline-block;
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--cyan);
    background:rgba(0,229,255,0.12);
    border:1px solid rgba(0,229,255,0.4);
    padding:4px 12px;
    border-radius:999px;
    margin-bottom:16px;
  }
  h1{font-size:34px; font-weight:700; margin-bottom:8px; background:linear-gradient(90deg,var(--magenta),var(--cyan)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .subtitle{color:var(--text-2); font-size:15px;}
  .metrics{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px;
    margin:32px 0 48px;
  }
  .metric{
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:16px;
    padding:20px;
    backdrop-filter:blur(6px);
  }
  .metric .num{font-size:32px; font-weight:700; background:linear-gradient(90deg,var(--magenta),var(--purple),var(--cyan)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .metric .label{font-size:13px; color:var(--text-2); margin-top:4px;}
  .section-title{font-size:18px; font-weight:600; margin-bottom:20px; color:var(--text-1);}
  .cards{display:flex; flex-direction:column; gap:20px;}
  .card{
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:20px;
    padding:28px;
    backdrop-filter:blur(6px);
    transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  }
  .card:hover{transform:translateY(-3px); border-color:rgba(0,229,255,0.5); box-shadow:0 12px 30px rgba(0,0,0,0.35);}
  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;}
  .card-heading{display:flex; align-items:center; gap:14px;}
  .icon-badge{
    width:44px; height:44px; min-width:44px;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--magenta),var(--purple));
  }
  .icon-badge.teal{background:linear-gradient(135deg,var(--teal),var(--cyan));}
  .icon-badge svg{width:24px; height:24px; stroke:#ffffff; fill:none; stroke-width:2;}
  .card-title{font-size:19px; font-weight:600; margin-bottom:4px;}
  .card-client{font-size:13px; color:var(--text-2);}
  .badge{
    font-size:12px;
    font-weight:600;
    padding:5px 14px;
    border-radius:999px;
    white-space:nowrap;
  }
  .badge.progress{background:rgba(255,176,32,0.18); color:var(--amber); border:1px solid rgba(255,176,32,0.4);}
  .badge.active{background:rgba(29,233,182,0.18); color:var(--teal); border:1px solid rgba(29,233,182,0.4);}
  .bar-track{
    width:100%;
    height:8px;
    background:rgba(255,255,255,0.1);
    border-radius:999px;
    margin:18px 0 8px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg,var(--magenta),var(--cyan));
  }
  .bar-label{font-size:12px; color:var(--text-2); margin-bottom:16px;}
  .next-step{
    font-size:14px;
    color:var(--text-1);
    background:rgba(255,255,255,0.04);
    border-left:3px solid var(--cyan);
    padding:12px 16px;
    border-radius:8px;
  }
  .next-step strong{color:var(--text-2); font-weight:600; display:block; font-size:11px; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px;}
  footer{
    margin-top:56px;
    text-align:center;
    color:var(--text-2);
    font-size:12px;
  }
  .section-row{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:20px;}
  .section-row .section-title{margin-bottom:0;}
  .wa-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    font-weight:600;
    color:#0d0221;
    background:linear-gradient(90deg,var(--teal),var(--cyan));
    border:none;
    padding:10px 18px;
    border-radius:999px;
    cursor:pointer;
    transition:opacity .2s ease, transform .2s ease;
  }
  .wa-btn:hover{transform:translateY(-1px);}
  .wa-btn:disabled{opacity:.5; cursor:not-allowed; transform:none;}
  .wa-btn svg{width:16px; height:16px; fill:#0d0221;}
  .wa-status{font-size:12px; margin-top:10px; min-height:16px;}
  .wa-status.ok{color:var(--teal);}
  .wa-status.err{color:var(--magenta);}
  .wa-config-link{font-size:11px; color:var(--text-2); text-decoration:underline; cursor:pointer; background:none; border:none; padding:0;}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand-row">
        <div class="logo-chip">
          <svg viewBox="0 0 400 140" xmlns="http://www.w3.org/2000/svg">
            <text x="0" y="95" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="105" fill="#24296b">CDP</text>
            <text x="4" y="128" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="24" letter-spacing="10" fill="#24296b">DIGITAL</text>
          </svg>
        </div>
        <div class="byline">
          Preparado por<br>
          <strong>Rene Becerra</strong> · Arquitecto de Soluciones MPS & ECM
        </div>
      </div>
      <div>
        <span class="eyebrow">CDP Digital</span>
        <h1>Proyectos y estado</h1>
        <p class="subtitle" id="subtitle">Resumen ejecutivo de oportunidades en curso — cargando...</p>
      </div>
    </header>

    <div class="metrics" id="metrics"></div>

    <div class="section-row">
      <div class="section-title">Oportunidades en curso</div>
      <div>
        <button class="wa-btn" id="waSendBtn" title="Enviar el resumen de avances a los grupos de WhatsApp configurados">
          <svg viewBox="0 0 24 24"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.29-1.39a9.87 9.87 0 0 0 4.75 1.21h.01c5.46 0 9.9-4.45 9.9-9.91C21.96 6.45 17.5 2 12.04 2zm0 18.06h-.01a8.2 8.2 0 0 1-4.19-1.15l-.3-.18-3.14.83.84-3.06-.2-.31a8.19 8.19 0 0 1-1.26-4.28c0-4.53 3.69-8.22 8.24-8.22 2.2 0 4.27.86 5.83 2.42a8.16 8.16 0 0 1 2.41 5.82c0 4.54-3.69 8.23-8.22 8.23z"/></svg>
          Enviar actualización a WhatsApp
        </button>
        <div style="text-align:right; margin-top:6px;">
          <button class="wa-config-link" id="waConfigLink">Configurar conexión</button>
        </div>
      </div>
    </div>
    <div class="wa-status" id="waStatus"></div>
    <div class="cards" id="cards"></div>

    <footer>CDP Digital · Dashboard interno de seguimiento de proyectos · Rene Becerra, Arquitecto de Soluciones MPS & ECM</footer>
  </div>

  <script>
    const ICONS = {
      printer: '<path stroke-linecap="round" stroke-linejoin="round" d="M6 9V3h12v6M6 18H4a1 1 0 0 1-1-1v-5a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-2M6 14h.01M6 18h12v3H6z"/>',
      location: '<path stroke-linecap="round" stroke-linejoin="round" d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/>',
      document: '<path stroke-linecap="round" stroke-linejoin="round" d="M14 3v5h5M6 3h8l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6M9 17h6M9 9h2"/>',
    };

    function badgeClass(statusType){
      return statusType === 'active' ? 'active' : 'progress';
    }

    function iconBadgeClass(icon){
      return icon === 'location' ? 'icon-badge teal' : 'icon-badge';
    }

    function formatDate(isoDate){
      const [year, month, day] = isoDate.split('-');
      const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      return `${parseInt(day,10)} de ${meses[parseInt(month,10)-1]} de ${year}`;
    }

    async function loadDashboard(){
      const res = await fetch('data/projects.json', { cache: 'no-store' });
      const data = await res.json();

      document.getElementById('subtitle').textContent =
        `Resumen ejecutivo de oportunidades en curso — actualizado el ${formatDate(data.updatedAt)}`;

      document.getElementById('metrics').innerHTML = `
        <div class="metric"><div class="num">${data.metrics.proyectosActivos}</div><div class="label">Proyectos activos</div></div>
        <div class="metric"><div class="num">${data.metrics.enCotizacion}</div><div class="label">En proceso de cotización</div></div>
        <div class="metric"><div class="num">${data.metrics.clientesInvolucrados}</div><div class="label">Clientes involucrados</div></div>
      `;

      document.getElementById('cards').innerHTML = data.projects.map((p) => `
        <div class="card">
          <div class="card-top">
            <div class="card-heading">
              <div class="${iconBadgeClass(p.icon)}">
                <svg viewBox="0 0 24 24">${ICONS[p.icon] || ICONS.document}</svg>
              </div>
              <div>
                <div class="card-title">${p.title}</div>
                <div class="card-client">Cliente: ${p.client}</div>
              </div>
            </div>
            <span class="badge ${badgeClass(p.statusType)}">${p.status}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${p.progress}%"></div></div>
          <div class="bar-label">Avance estimado: ${p.progress}%</div>
          <div class="next-step">
            <strong>Próximo paso</strong>
            ${p.nextStep}
          </div>
        </div>
      `).join('');
    }

    loadDashboard().catch((err) => {
      document.getElementById('subtitle').textContent = 'No se pudieron cargar los datos de proyectos.';
      console.error(err);
    });

    // --- Integración con WhatsApp ---
    const waStatusEl = document.getElementById('waStatus');
    const waSendBtn = document.getElementById('waSendBtn');

    function getWaConfig(){
      return {
        backendUrl: localStorage.getItem('cdp_wa_backend_url') || '',
        apiKey: localStorage.getItem('cdp_wa_api_key') || '',
      };
    }

    function setWaConfig(){
      const current = getWaConfig();
      const backendUrl = prompt('URL del backend de WhatsApp (ej: https://tu-backend.onrender.com):', current.backendUrl);
      if (backendUrl === null) return;
      const apiKey = prompt('API key configurada en el backend (SEND_API_KEY):', current.apiKey);
      if (apiKey === null) return;
      localStorage.setItem('cdp_wa_backend_url', backendUrl.trim().replace(/\/$/, ''));
      localStorage.setItem('cdp_wa_api_key', apiKey.trim());
    }

    document.getElementById('waConfigLink').addEventListener('click', setWaConfig);

    waSendBtn.addEventListener('click', async () => {
      const { backendUrl, apiKey } = getWaConfig();
      if (!backendUrl || !apiKey) {
        setWaConfig();
        return;
      }

      waSendBtn.disabled = true;
      waStatusEl.className = 'wa-status';
      waStatusEl.textContent = 'Enviando actualización a los grupos de WhatsApp...';

      try {
        const res = await fetch(`${backendUrl}/send-update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
          body: '{}',
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error desconocido');

        const failed = data.results.filter((r) => !r.ok);
        if (failed.length) {
          waStatusEl.className = 'wa-status err';
          waStatusEl.textContent = `Enviado con errores en ${failed.length} grupo(s): ${failed.map((f) => f.error).join(', ')}`;
        } else {
          waStatusEl.className = 'wa-status ok';
          waStatusEl.textContent = `Actualización enviada a ${data.results.length} grupo(s) correctamente.`;
        }
      } catch (err) {
        waStatusEl.className = 'wa-status err';
        waStatusEl.textContent = `No se pudo enviar: ${err.message}`;
      } finally {
        waSendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
